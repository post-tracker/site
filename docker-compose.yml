services:
  # --- Infrastructure ---

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-devtracker}
      MYSQL_DATABASE: ${DB_NAME:-developertracker}
      MYSQL_USER: ${DB_USERNAME:-devtracker}
      MYSQL_PASSWORD: ${DB_PASSWORD:-devtracker}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- HTTP Services ---

  rest-api:
    image: ghcr.io/post-tracker/rest-api:latest
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: mysql
      DB_NAME: ${DB_NAME:-developertracker}
      DB_USERNAME: ${DB_USERNAME:-devtracker}
      DB_PASSWORD: ${DB_PASSWORD:-devtracker}
      API_TOKENS: ${API_TOKENS:-{}}
      API_TOKEN: ${API_TOKEN:-}
    depends_on:
      mysql:
        condition: service_healthy

